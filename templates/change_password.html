<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

    .profile-card{
        max-width:600px;
        margin:50px auto;
        background:#1e293b;
        padding:30px;
        border-radius:15px;
    }

    .profile-card h2{
        text-align:center;
        margin-bottom:25px;
    }

    .profile-item{
        margin-bottom:15px;
    }

    .profile-item label{
        display:block;
        margin-bottom:8px;
        color:#94a3b8;
    }

    .profile-item input{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#0f172a;
        color:white;
    }

    .save-btn{
        width:100%;
        background:#22c55e;
        color:white;
        padding:12px;
        border:none;
        border-radius:10px;
        cursor:pointer;
    }

    .back-btn{
        display:block;
        text-align:center;
        margin-top:15px;
        background:#3b82f6;
        color:white;
        padding:12px;
        border-radius:10px;
        text-decoration:none;
    }

    </style>
</head>

<body>

<div class="profile-card">

    <h2>🔒 Change Password</h2>

    <form method="POST">

        <div class="profile-item">
            <label>Current Password</label>
            <input type="password"
                   name="current_password"
                   required>
        </div>

        <div class="profile-item">
            <label>New Password</label>
            <input type="password"
                   name="new_password"
                   required>
        </div>

        <div class="profile-item">
            <label>Confirm Password</label>
            <input type="password"
                   name="confirm_password"
                   required>
        </div>

        <button type="submit" class="save-btn">
            Update Password
        </button>

    </form>

    <a href="/profile" class="back-btn">
        ← Back to Profile
    </a>

</div>

</body>
</html>
