<!DOCTYPE html>

<html>
<head>
    <title>Change Password</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

<style>

.profile-card form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.profile-item{
    width:100%;
}

.profile-item label{
    display:block;
    margin-bottom:8px;
    color:#94a3b8;
}

.profile-item input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

.save-btn{
    width:100%;
    background:#22c55e;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:15px;
    background:#3b82f6;
    color:white;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
}

.flash-error{
    background:#ef4444;
    color:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
    font-weight:600;
}

.flash-success{
    background:#22c55e;
    color:white;
    padding:12px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
    font-weight:600;
}

</style>

</head>

<body>

<div class="profile-card">

<h2>🔒 Change Password</h2>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}

            {% if "✅" in message %}
                <div class="flash-success">
                    {{ message }}
                </div>
            {% else %}
                <div class="flash-error">
                    {{ message }}
                </div>
            {% endif %}

        {% endfor %}
    {% endif %}
{% endwith %}

<form method="POST">

    <label>Current Password</label>
    <input type="password"
           name="current_password"
           required>

    <label>New Password</label>
    <input type="password"
           name="new_password"
           required>

    <label>Confirm Password</label>
    <input type="password"
           name="confirm_password"
           required>

    <button type="submit" class="save-btn">
        🔒 Update Password
    </button>

</form>

<a href="/profile" class="back-btn">
    ← Back to Profile
</a>

</div>

</body>
</html>
