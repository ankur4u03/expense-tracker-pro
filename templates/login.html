
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .login-box{
            background:#1e293b;
            width:400px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        .logo{
            color:white;
            font-size:30px;
            margin-bottom:10px;
        }

        .subtitle{
            color:#cbd5e1;
            margin-bottom:20px;
            font-size:14px;
        }

        .beta-banner{
            background:#f59e0b;
            color:#000;
            padding:10px;
            border-radius:10px;
            font-weight:bold;
            margin-bottom:20px;
        }

        h2{
            color:white;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:none;
            border-radius:8px;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .bottom-text{
            margin-top:20px;
            color:white;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
            font-weight:bold;
        }

        a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h1 class="logo">💰 Expense Tracker Pro</h1>

        <p class="subtitle">
            Manage Your Expenses Smartly
        </p>

        <div class="beta-banner">
            🚧 Website Under Development<br>
            Beta Testing Version
        </div>

        <h2>Login</h2>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="bottom-text">
            Don't have an account?
            <br><br>
            <a href="/register">Create Account</a>
        </div>

    </div>

</body>
</html>
