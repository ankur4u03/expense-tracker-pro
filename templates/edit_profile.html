<!DOCTYPE html>

<html>
<head>
    <title>Edit Profile - Expense Tracker Pro</title>

```
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

    .profile-card{
        max-width:600px;
        margin:50px auto;
        background:#1e293b;
        padding:30px;
        border-radius:15px;
    }

    .profile-card h2{
        text-align:center;
        margin-bottom:25px;
    }

    .profile-item{
        margin-bottom:15px;
    }

    .profile-item label{
        display:block;
        margin-bottom:8px;
        color:#94a3b8;
    }

    .profile-item input{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#0f172a;
        color:white;
    }

    .save-btn{
        display:inline-block;
        background:#22c55e;
        color:white;
        padding:12px 20px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-weight:bold;
        margin-top:10px;
    }

    .back-btn{
        display:inline-block;
        margin-top:15px;
        background:#3b82f6;
        color:white;
        padding:12px 20px;
        border-radius:10px;
        text-decoration:none;
    }

</style>
```

</head>

<body>

<div class="container">

```
<div class="profile-card">

    <h2>✏️ Edit Profile</h2>

    <form method="POST">

        <div class="profile-item">
            <label>Username</label>

            <input
                type="text"
                name="username"
                value="{{ username }}"
                required>
        </div>

        <div class="profile-item">
            <label>Email</label>

            <input
                type="email"
                value="{{ email }}"
                readonly>
        </div>

        <button type="submit" class="save-btn">
            💾 Save Changes
        </button>

    </form>

    <br>

    <a href="/profile" class="back-btn">
        ← Back to Profile
    </a>

</div>
```

</div>

</body>
</html>
