<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Expense Tracker Pro</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .profile-card{
            max-width:600px;
            margin:50px auto;
            background:#1e293b;
            padding:30px;
            border-radius:15px;
        }

        .profile-card h2{
            text-align:center;
            margin-bottom:25px;
        }

        .profile-item{
            background:#0f172a;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
        }

        .profile-label{
            color:#94a3b8;
            font-size:14px;
        }

        .profile-value{
            font-size:18px;
            margin-top:5px;
        }

        .back-btn{
            display:inline-block;
            margin-top:20px;
            background:#3b82f6;
            color:white;
            padding:10px 15px;
            border-radius:10px;
            text-decoration:none;
        }
        .profile-actions{
    margin-top:20px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.edit-profile-btn{
    background:#3b82f6;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    text-decoration:none;
}

.change-password-btn{
    background:#f59e0b;
    color:black;
    padding:10px 15px;
    border-radius:10px;
    text-decoration:none;
}
    </style>
</head>

<body>

<div class="container">

    <div class="profile-card">

        <h2>👤 My Profile</h2>

        <div class="profile-item">
            <div class="profile-label">Username</div>
            <div class="profile-value">{{ username }}</div>
        </div>

        <div class="profile-item">
            <div class="profile-label">Email</div>
            <div class="profile-value">{{ email }}</div>
        </div>

        <div class="profile-actions">

    <a href="/edit-profile" class="edit-profile-btn">
        ✏️ Edit Profile
    </a>

    <a href="/change-password" class="change-btn">
        🔒 Change Password
    </a>

</div>

        <a href="/" class="back-btn">← Back to Dashboard</a>

    </div>

</div>

</body>
</html>
